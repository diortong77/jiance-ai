<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>简策AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>简策AI</h1>
    <p class="subtitle">输入品牌和需求，生成短视频脚本</p>

    <div class="card">
      <form id="form">
        <label>品牌名称</label>
        <input id="brand" placeholder="例如：瑞幸咖啡">

        <label>视频主题</label>
        <input id="theme" placeholder="例如：新品推广">

        <label>重点表达</label>
        <textarea id="focus" placeholder="例如：低糖、提神、适合通勤"></textarea>

        <button type="submit">生成脚本</button>
      </form>
    </div>

    <div class="card">
      <h3>生成结果</h3>
      <pre id="result"></pre>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>

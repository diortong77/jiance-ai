<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>简策AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>简策AI</h1>
  <p>输入品牌和需求，生成短视频脚本</p>

  <form id="form">
    <input id="brand" placeholder="品牌"><br><br>
    <input id="theme" placeholder="主题"><br><br>
    <textarea id="focus" placeholder="重点表达"></textarea><br><br>

    <button type="submit">生成脚本</button>
  </form>

  <pre id="result"></pre>

  <script src="script.js"></script>

</body>
</html>
